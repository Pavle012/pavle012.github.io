<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pavle's Repositories</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0d1117] text-[#c9d1d9] font-sans antialiased">

    <div class="max-w-4xl mx-auto p-6">
        <h1 class="text-2xl font-semibold border-b border-[#30363d] pb-4 mb-6">Repositories</h1>
        <div id="repo-list" class="space-y-4">
            <p class="text-[#8b949e]">Loading repos...</p>
        </div>
    </div>

    <script>
        const USERNAME = 'pavle012';
        
        async function fetchRepos() {
            try {
                const res = await fetch(`https://api.github.com/users/${USERNAME}/repos?sort=updated`);
                const repos = await res.json();
                const container = document.getElementById('repo-list');
                container.innerHTML = '';

                repos.forEach(repo => {
                    const card = document.createElement('div');
                    card.className = "p-5 border border-[#30363d] rounded-lg bg-[#161b22] hover:bg-[#1f242c] transition flex flex-col gap-2";
                    
                    card.innerHTML = `
                        <div class="flex items-center gap-2">
                            <a href="${repo.html_url}" target="_blank" class="text-[#58a6ff] hover:underline font-semibold text-lg">
                                ${repo.name}
                            </a>
                            <span class="text-xs text-[#8b949e] border border-[#30363d] px-2 py-0.5 rounded-full">
                                ${repo.private ? 'Private' : 'Public'}
                            </span>
                        </div>
                        <p class="text-[#8b949e] text-sm">${repo.description || 'No description provided.'}</p>
                        <div class="flex items-center gap-4 text-xs text-[#8b949e] mt-2">
                            ${repo.language ? `
                                <div class="flex items-center gap-1.5">
                                    <span class="w-3 h-3 rounded-full bg-[#3572A5]"></span>
                                    <span>${repo.language}</span>
                                </div>
                            ` : ''}
                            <span>⭐ ${repo.stargazers_count}</span>
                            <span>Updated ${new Date(repo.updated_at).toLocaleDateString()}</span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                document.getElementById('repo-list').innerHTML = `<p class="text-red-400">Failed to load repos.</p>`;
            }
        }

        fetchRepos();
    </script>
</body>
</html>
